<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Album Uploader</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 22px; }
    label { display: block; margin-top: 12px; font-size: 14px; color: #333; }
    input, textarea { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    #status { margin-top: 16px; font-size: 14px; white-space: pre-wrap; }
    .ok { color: #0a7d2a; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <h1>Album Uploader</h1>
  <form id="f">
    <label>Album
      <input name="album" required placeholder="e.g. vacation-2026">
    </label>
    <label>Title
      <input name="title">
    </label>
    <label>Description
      <textarea name="description" rows="3"></textarea>
    </label>
    <label>Image
      <input type="file" name="image" accept="image/*" required>
    </label>
    <button type="submit">Upload</button>
  </form>
  <div id="status"></div>

  <script>
    const form = document.getElementById('f');
    const status = document.getElementById('status');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.className = '';
      status.textContent = 'Uploading...';
      const data = new FormData(form);
      try {
        const r = await fetch('/upload', { method: 'POST', body: data });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'upload failed');
        status.className = 'ok';
        status.textContent = 'Queued: ' + JSON.stringify(j, null, 2);
        form.reset();
      } catch (err) {
        status.className = 'err';
        status.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
