<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Album Uploader</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 22px; }
    h2 { font-size: 18px; margin-top: 32px; border-top: 1px solid #eee; padding-top: 24px; }
    label { display: block; margin-top: 12px; font-size: 14px; color: #333; }
    input, textarea { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    #status { margin-top: 16px; font-size: 14px; white-space: pre-wrap; }
    .ok { color: #0a7d2a; }
    .err { color: #b00020; }
    .row { display: flex; gap: 8px; align-items: flex-end; }
    .row input { flex: 1; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 16px; }
    .card { border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; background: #fafafa; }
    .card img { width: 100%; height: 180px; object-fit: cover; display: block; background: #eee; }
    .card .meta { padding: 8px; font-size: 12px; }
    .card .meta .t { font-weight: 600; }
    .card .meta .d { color: #666; margin-top: 2px; }
    .empty { color: #666; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Album Uploader</h1>

  <form id="upload-form">
    <label>Album
      <input name="album" required placeholder="e.g. vacation-2026">
    </label>
    <label>Title
      <input name="title">
    </label>
    <label>Description
      <textarea name="description" rows="3"></textarea>
    </label>
    <label>Image
      <input type="file" name="image" accept="image/*" required>
    </label>
    <button type="submit">Upload</button>
  </form>
  <div id="status"></div>

  <h2>Browse album</h2>
  <form id="browse-form" class="row">
    <label style="flex:1; margin:0">Album
      <input id="browse-album" required placeholder="album name">
    </label>
    <button type="submit">Load</button>
  </form>
  <div id="gallery" class="grid"></div>

  <script>
    const statusEl = document.getElementById('status');
    const gallery = document.getElementById('gallery');

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.className = '';
      statusEl.textContent = 'Uploading...';
      const form = e.target;
      try {
        const r = await fetch('/upload', { method: 'POST', body: new FormData(form) });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'upload failed');
        statusEl.className = 'ok';
        statusEl.textContent = 'Uploaded: ' + j.s3_key;
        const album = form.album.value;
        form.reset();
        document.getElementById('browse-album').value = album;
        loadAlbum(album);
      } catch (err) {
        statusEl.className = 'err';
        statusEl.textContent = 'Error: ' + err.message;
      }
    });

    document.getElementById('browse-form').addEventListener('submit', (e) => {
      e.preventDefault();
      loadAlbum(document.getElementById('browse-album').value.trim());
    });

    async function loadAlbum(album) {
      if (!album) return;
      gallery.innerHTML = '<div class="empty">Loading...</div>';
      try {
        const r = await fetch('/albums/' + encodeURIComponent(album));
        const items = await r.json();
        if (!Array.isArray(items) || items.length === 0) {
          gallery.innerHTML = '<div class="empty">No images in "' + album + '".</div>';
          return;
        }
        gallery.innerHTML = items.map(it => `
          <div class="card">
            <img src="${it.url}" alt="${(it.title||it.original_filename||'').replace(/"/g,'&quot;')}" loading="lazy">
            <div class="meta">
              <div class="t">${escapeHtml(it.title || it.original_filename || it.image_id)}</div>
              <div class="d">${escapeHtml(it.description || '')}</div>
            </div>
          </div>`).join('');
      } catch (err) {
        gallery.innerHTML = '<div class="empty err">Error: ' + err.message + '</div>';
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
